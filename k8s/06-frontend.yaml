apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 100xdevs/chat-app-frontend:latest
          ports:
            - containerPort: 4173
---

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: chat-app
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 4173
      targetPort: 4173