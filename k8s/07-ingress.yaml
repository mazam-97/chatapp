# nginx reverse proxy that routes by Host header to the right service:
#   chat-app.100xdevs.com      -> frontend  (4173)
#   api.chat-app.100xdevs.com  -> backend   (3001)
#   ws.chat-app.100xdevs.com   -> websocket (8080)
#
# A LoadBalancer service fronts the nginx pods and forwards traffic to them,
# and nginx reverse proxies each request to the correct backend pods/service.

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-conf
  namespace: chat-app
data:
  default.conf: |
    # Frontend
    server {
      listen 80;
      server_name chat-app.100xdevs.com;

      location / {
        proxy_pass http://frontend.chat-app.svc.cluster.local:4173;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }

    # Backend API
    server {
      listen 80;
      server_name api.chat-app.100xdevs.com;

      location / {
        proxy_pass http://backend.chat-app.svc.cluster.local:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }

    # WebSocket
    server {
      listen 80;
      server_name ws.chat-app.100xdevs.com;

      location / {
        proxy_pass http://websocket.chat-app.svc.cluster.local:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-proxy
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-proxy-conf
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy
  namespace: chat-app
spec:
  type: LoadBalancer
  selector:
    app: nginx-proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
